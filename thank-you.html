<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message sent · Joselyne García</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080A12; color: #fff;
      font-family: 'Times New Roman', Times, serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .wrap { max-width: 480px; }
    .icon {
      width: 56px; height: 56px; border: 2px solid #1547D4;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
    }
    .icon svg { width: 24px; height: 24px; stroke: #1547D4; fill: none; stroke-width: 2; }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.1; margin-bottom: 16px;
    }
    h1 span { color: #3A67F5; font-style: italic; }
    p { font-size: 16px; color: #8088A0; line-height: 1.7; margin-bottom: 40px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1547D4; color: #fff;
      font-family: 'DM Mono', monospace; font-size: 12px;
      letter-spacing: .08em; text-decoration: none;
      padding: 14px 32px; transition: background .2s;
    }
    a:hover { background: #1A56E8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Message <span>received.</span></h1>
    <p>Thank you for reaching out. We'll review your project details and get back to you within one business day.</p>
    <a href="portfolio.html">← Back to the site</a>
  </div>
</body>
</html>
